    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Cadastre sua conta">
        <title>Cadastro | Barbearia Imperial</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

        <main>

            <section class="cadastro">

                <div class="formulario-card">

                    <h2>Crie a sua conta</h2>

                    <form action="cliente.html" method="post" class="form-cadastro">

                        <div class="campo_formulario">

                            <label for="name">Digite seu nome completo:</label>
                            <input type="text" id="name" name="name" placeholder="Fulano da Silva" autocomplete="name" required />
                            
                        </div>

                        <div class="campo-formulario">

                            <label for="email">E-mail:</label>
                            <input type="email" 
                            id="email" 
                            name="email" 
                            placeholder="email@email.com" 
                            autocomplete="email" 
                            required 
                            />

                        </div>


                        <div class="campo-formulario">
                        
                            <label for="email_confirm">Confirme o e-mail:</label>
                            <input type="email" 
                            id="email_confirm" 
                            name="email_confirm" 
                            placeholder="email@email.com" 
                            required 
                            />

                        </div>

                        <div class="campo-formulario">

                            <label for="telefone">Telefone:</label>

                            <input 
                            type="tel" 
                            id="telefone" 
                            name="telefone" 
                            placeholder="(11) 91234-5678" 
                            pattern="^\(\d{2}\)\s?(?:9\d{4}|\d{4})-\d{4}$"
                            required
                            />
                        
                        </div>
                        
                        <div class="campo-formulario">

                            <label for="password">Senha:</label>

                            <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Digite sua senha" 
                            minlength="8" 
                            autocomplete="new-password" 
                            required 
                            />

                        </div>

                        <div class="campo-formulario">

                            <label for="password_confirm">Confirme a senha:</label>

                            <input 
                            type="password" 
                            id="password_confirm" 
                            name="password_confirm"
                            placeholder="Confirme a sua senha" 
                            minlength="8"
                            required 
                            />

                        </div>

                        <button type="submit">Cadastrar-se</button>

                    </form>

                    <a href="login.html">Já possuo uma conta</a>

                </div>

            </section>

        </main>

    </body>

</html>
