<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastre sua conta">
    <title>Barbearia Imperial</title>
    <link rel="stylesheet" href="C:\Users\davim\source\repos\malvaodavi\agendamentocliente\projetoagendamento\css\style.css">
</head>

<body>

    <div class="container">

        <h2>Crie a sua conta</h2>
        <form action="cliente.html" method="post" class="form-login">

            <label for="name">Digite seu nome completo:</label>
            <input type="text" id="name" name="name" placeholder="Fulano da Silva" required />

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="email@email.com" required />

            <label for="email">Confirme o e-mail:</label>
            <input type="email" id="email_confirm" name="email_confirm" placeholder="email@email.com" required />

            <label for="tel">Telefone:</label>
            <input type="tel" id="tel" name="tel" placeholder="(11)91234-5678" required />

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite a senha" required />

            <label for="senha">Confirme a senha:</label>
            <input type="password" id="senha_confirm" name="senha_confirm" placeholder="Confirme a sua senha" required />

            <button type="submit">Cadastrar-se</button>
        </form>

        <a href=login.html>Já possuo uma conta</a>

    </div>

</body>
