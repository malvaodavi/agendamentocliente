<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faça login e faça seu agendamento!">
    <title>Login | Barbearia Imperial</title>
    <link rel="stylesheet" href="projetoagendamento/css/style.css">
</head>

    <body>

        <main>

            <section class="login">

                <div class="formulario-card">

                    <h2>Acesse a área do cliente</h2>
                    <form action="cliente.html" method="post" class="form-login">

                        <div class="campo-formulario">
                            <label for="email">E-mail:</label>
                            <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Digite seu e-mail" 
                            autocomplete="email"
                            required
                            />
                        </div>

                        <div class="campo-formulario">
                            <label for="senha">Senha:</label>
                            <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            placeholder="Digite a senha" 
                            autocomplete="current-password"
                            required
                            />

                        </div>

                        <button type="submit">Entrar</button>

                    </form>

                    <a href="cadastro.html">Não tem uma conta? Cadastre-se</a>

                </div>

            </section>

        </main>

    </body>

</html>
